version: '3.9'

services:
  mcp_server:
    build: ./mcp_server
    ports:
      - "8001:8001"
    environment:
      - PORT=8001

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4o-mini
      - MCP_SERVER_URL=http://mcp_server:8001
    depends_on:
      - mcp_server

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
